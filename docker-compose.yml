version: '3.9'

services:

  app:
    image: vidya758/atlan-demo:latest
    container_name: atlan-demo

    ports:
      - "8888:5001"

    depends_on:
      - db

    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/atlan_db

    restart: always

  db:
    image: postgres:15

    container_name: atlan-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vidya@123
      POSTGRES_DB: atlan_db

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: always

volumes:
  postgres_data: